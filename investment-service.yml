server:
  port: 8084

spring:
  application:
    name: investment-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/investments_db}
    username: ${SPRING_DATASOURCE_USERNAME:dheeraj}
    password: ${SPRING_DATASOURCE_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Must match api-gateway route prefix so /investments/v3/api-docs resolves when proxied.
springdoc:
  api-docs:
    path: /investments/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.founderlink: INFO
