server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    # Use the same port as your server (\conninfo → Server Port). Default here is 5433 vs common 5432.
    # Override: SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5433/auth
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/auth_db}
    username: dheeraj
    password: password123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Matches api-gateway path /auth/v3/api-docs when proxied.
springdoc:
  api-docs:
    path: /auth/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  # Override in production (min 256 bits / 32 bytes for HS256)
  secret: ${JWT_SECRET:FounderLinkDevSecretKeyMustBeAtLeast32BytesLong!!}
  access-expiration-ms: 3600000
  refresh-expiration-ms: 604800000

logging:
  pattern:
    level: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [%X{traceId:-},%X{spanId:-}] - %msg%n"
  level:
    com.founderlink: INFO

management:
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    enabled: true
    sampling:
      probability: 1.0