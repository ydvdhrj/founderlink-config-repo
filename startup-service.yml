# Port 8083: user-service uses 8082 in this workspace (spec 8082 would conflict).
server:
  port: ${SERVER_PORT:8083}
  # So ServletUriComponentsBuilder + Location reflects the gateway host when proxied
  forward-headers-strategy: framework

spring:
  application:
    name: startup-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/startups_db}
    username: ${SPRING_DATASOURCE_USERNAME:dheeraj}
    password: ${SPRING_DATASOURCE_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Fail fast if Postgres is down (avoids “loading forever” on GET /startups)
      connection-timeout: 10000
      maximum-pool-size: 10

  cloud:
    openfeign:
      client:
        config:
          # GET /startups/{id} loads founder via Feign — without timeouts the call can hang on bad networking/Eureka
          default:
            connectTimeout: 5000
            readTimeout: 15000
          user-service:
            connectTimeout: 5000
            readTimeout: 15000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Same signing secret as auth-service / api-gateway
jwt:
  secret: ${JWT_SECRET:FounderLinkDevSecretKeyMustBeAtLeast32BytesLong!!}

# Must match api-gateway route prefix so /startups/v3/api-docs resolves when proxied.
springdoc:
  api-docs:
    path: /startups/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [%X{traceId:-},%X{spanId:-}] - %msg%n"
  level:
    com.founderlink: INFO

resilience4j:
  circuitbreaker:
    instances:
      userService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000ms

management:
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    enabled: true
    sampling:
      probability: 1.0
