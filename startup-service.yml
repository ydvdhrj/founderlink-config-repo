# Port 8083: user-service uses 8082 in this workspace (spec 8082 would conflict).
server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: startup-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/startups_db}
    username: ${SPRING_DATASOURCE_USERNAME:dheeraj}
    password: ${SPRING_DATASOURCE_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Must match api-gateway route prefix so /startups/v3/api-docs resolves when proxied.
springdoc:
  api-docs:
    path: /startups/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.founderlink: INFO
