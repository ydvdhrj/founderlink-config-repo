server:
  port: 8080

spring:
  application:
    name: api-gateway
  reactor:
    context-propagation: auto
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/users/**
            - id: startup-service
              uri: lb://startup-service
              predicates:
                - Path=/startups/**
            - id: investment-service
              uri: lb://investment-service
              predicates:
                - Path=/investments/**
            - id: team-service
              uri: lb://team-service
              predicates:
                - Path=/teams/**
            - id: messaging-service
              uri: lb://messaging-service
              predicates:
                - Path=/messages/**

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /auth/v3/api-docs
      - name: User Service
        url: /users/v3/api-docs
      - name: Startup Service
        url: /startups/v3/api-docs
      - name: Investment Service
        url: /investments/v3/api-docs
      - name: Team Service
        url: /teams/v3/api-docs
      - name: Messaging Service
        url: /messages/v3/api-docs

logging:
  pattern:
    level: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [%applicationName,%X{traceId:-},%X{spanId:-}] - %msg%n"
  level:
    com.founderlink: INFO

jwt:
  secret: ${JWT_SECRET:FounderLinkDevSecretKeyMustBeAtLeast32BytesLong!!}

management:
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    enabled: true
    sampling:
      probability: 1.0
