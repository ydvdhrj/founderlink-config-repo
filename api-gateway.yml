server:
  port: 8080

spring:
  application:
    name: api-gateway
  reactor:
    context-propagation: auto
  cloud:
    gateway:
      server:
        webflux:
          # Bound upstream waits so Swagger does not spin forever when a service is down
          httpclient:
            connect-timeout: 5000
            response-timeout: 45s
          discovery:
            locator:
              enabled: false
          routes:
            - id: notification-health-alias
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/health
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                # Match collection root GET/POST /users as well as /users/**
                - Path=/users,/users/**
            - id: startup-service
              uri: lb://STARTUP-SERVICE
              predicates:
                - Path=/startups,/startups/**
            - id: investment-service
              uri: lb://INVESTMENT-SERVICE
              predicates:
                - Path=/investments,/investments/**
            - id: team-service
              uri: lb://TEAM-SERVICE
              predicates:
                - Path=/teams,/teams/**
            - id: messaging-service
              uri: lb://MESSAGING-SERVICE
              predicates:
                - Path=/messages,/messages/**
            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/notifications,/notifications/**
              filters:
                - StripPrefix=1

eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /auth/v3/api-docs
      - name: User Service
        url: /users/v3/api-docs
      - name: Startup Service
        url: /startups/v3/api-docs
      - name: Investment Service
        url: /investments/v3/api-docs
      - name: Team Service
        url: /teams/v3/api-docs
      - name: Messaging Service
        url: /messages/v3/api-docs
      - name: Notification Service
        url: /notifications/v3/api-docs

logging:
  pattern:
    level: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [%X{traceId:-},%X{spanId:-}] - %msg%n"
  level:
    com.founderlink: INFO

jwt:
  secret: ${JWT_SECRET:FounderLinkDevSecretKeyMustBeAtLeast32BytesLong!!}

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: http://localhost:9411/api/v2/spans
